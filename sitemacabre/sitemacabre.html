<!DOCTYPE html> <!-- Ele força o navegador a usar o "modo de padrões" (standards mode)-->
<html lang="en"> <!--efine o idioma principal de um documento HTML como inglês-->
<head> <!--é um contêiner invisível ao usuário que armazena metadados cruciais sobre a página, como título, conjunto de caracteres, links para CSS e scripts-->
    <meta charset="UTF-8"> <!-- é uma metatag fundamental no HTML, colocada dentro do <head>, que informa ao navegador para usar a codificação de caracteres Unicode UTF-8.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- é essencial para a responsividade no HTML instruindo o navegador a ajustar a largura da página à tela do dispositivo-->
    <title>Document</title> <!-- define o título da página exibido na aba do navegador, barra de favoritos e resultados de busca (SEO). -->
    <link rel="stylesheet" href="style.css"> <!--conecta o arquivo css ao arquivo python-->
</head>
<body> <!--é o contêiner principal de um documento HTML, contendo todo o conteúdo visível da página, como textos, imagens, vídeos, tabelas e links.-->
    <div class = "card">
        <!--atributos da clase-->
        <h1>Macabre - Sinister slaughter</h1> <!--titulo-->
        <img src="https://cdn2.solojavirtual.com/loja/arquivos_loja/42184/Fotos/thumbs3/produto_Foto1_9496202.jpg?cache=20230404153715" alt="macabre album " width="1500"> <!--link da imagem, definição da imagem e tamanho-->
        <p>Esse é o melhor album do macabre.</p>
    </div>
</body> <!--fecha o corpo-->
</html>
